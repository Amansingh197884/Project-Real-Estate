<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fixed Content Banner</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        /* Main Banner Wrapper */
        .hero-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        /* Swiper occupies full background */
        .swiper {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            /* Optional: subtle zoom effect */
            transform: scale(1.1);
            transition: transform 6s ease;
        }

        .swiper-slide-active .slide-bg {
            transform: scale(1);
        }

        /* Static Content Overlay - FIXED IN CENTER */
        .fixed-content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* Above the slider */
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Allows clicking through to slider if needed */
            background: rgba(0, 0, 0, 0.3); /* Global Dark Overlay */
        }

        .inner-content {
            text-align: center;
            color: #fff;
            pointer-events: auto; /* Re-enable clicks for buttons */
            padding: 20px;
        }

        /* Typography */
        .banner-title {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .banner-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .custom-btn {
            margin-top: 30px;
            padding: 12px 40px;
            border: 2px solid #fff;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.3s;
        }

        .custom-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Custom Pagination Positioning */
        .swiper-pagination-bullets {
            bottom: 30px !important;
            z-index: 20;
        }
        
        .swiper-pagination-bullet {
            background: #fff !important;
            width: 12px;
            height: 12px;
            opacity: 0.5;
        }

        .swiper-pagination-bullet-active {
            opacity: 1;
            width: 35px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="hero-wrapper">
    
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('https://cdn.maxestates.in/wp-content/themes/max-estate/html/img/project-residential-spotlight-1.jpg');"></div>
            </div>
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('https://cdn.maxestates.in/wp-content/themes/max-estate/html/img/project-residential-spotlight-3.jpg');"></div>
            </div>
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('https://cdn.maxestates.in/wp-content/uploads/2024/11/me-128-spotlight-new-1.jpg');"></div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="fixed-content-overlay">
        <div class="inner-content container">
             <div class="container hero-content">
            <div class="row gy-5 align-items-center">

                <div class="col-lg-7" data-aos="fade-right" data-aos-duration="1200">
                    <h1 class="display-4 fw-bold mb-2 text-uppercase" style="color: var(--gold-color);">Noida Land -
                        Tower A</h1>
                    <p class="h3 fw-light mb-4">3 & 4 BHK Super Luxury Apartments</p>

                    <ul class="amenities-list">
                        <li><i class="fa-solid fa-check-double me-3" style="color: var(--gold-color);"></i> Price starts
                            @ 2.80 Cr* Onwards</li>
                        <li><i class="fa-solid fa-check-double me-3" style="color: var(--gold-color);"></i> New Launch
                            Project in Center Noida</li>
                        <li><i class="fa-solid fa-check-double me-3" style="color: var(--gold-color);"></i> 3-Tier
                            International Standard Security</li>
                        <li><i class="fa-solid fa-check-double me-3" style="color: var(--gold-color);"></i> Fully
                            Ventilated Corner Apartments</li>
                    </ul>

                    <div class="mt-4 d-flex flex-wrap gap-3 justify-content-center justify-content-lg-start">
                        <a href="tel:12345678"
                            class="btn btn-outline-light btn-lg px-5 py-3 fw-bold rounded-pill">Call Now</a>
                        <a href="#" class="btn btn-warning btn-lg px-5 py-3 fw-bold rounded-pill shadow">Brochure</a>
                    </div>
                </div>

                <div class="col-lg-5" data-aos="zoom-in" data-aos-delay="300">
                    <div class="form-card">
                        <h3>Enquire Now</h3>
                        <form id="leadForm">
                            <input type="text" class="form-control" placeholder="Full Name" required>
                            <input type="email" class="form-control" placeholder="Email Address" required>
                            <input type="tel" class="form-control" placeholder="Phone Number" required>

                            <div class="captcha-box">
                                <span class="captcha-label">3 + 5 =</span>
                                <input type="number" class="form-control mb-0 border-0 shadow-none" placeholder="Total"
                                    required>
                            </div>

                            <button type="submit" class="submit-btn">GET A QUOTE</button>
                        </form>
                        <div class="text-center mt-4">
                            <span class="text-white-50 small">OR CALL US AT</span><br>
                            <a href="tel:9800330039" class="h5 text-decoration-none fw-bold"
                                style="color: var(--gold-color);">+91 98003 30039</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    var swiper = new Swiper(".mySwiper", {
        loop: true,
        speed: 1500, // Smooth slow transition
        autoplay: {
            delay: 4000,
            disableOnInteraction: false,
        },
        effect: 'fade', // Cross-fade for the background
        fadeEffect: {
            crossFade: true
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
        },
    });
</script>

</body>
</html>
