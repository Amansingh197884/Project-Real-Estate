<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Zenith - Tower A</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        /* Hero Section Container */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Swiper Background Styling */
        .swiper {
            position: absolute !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7); /* Darkens bg for text readability */
        }

        /* Overlay Content Layer */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
            align-items: center;
        }

        /* Left Side Content */
        .left-content {
            animation: fadeInLeft 1.2s ease-out;
        }

        .left-content h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #f3e5ab; /* Golden/Cream color from image */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .left-content h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .new-launch {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .rera-no {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 20px;
            display: block;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            border-radius: 4px;
        }

        .btn-call { background-color: #000; color: white; border: 1px solid #fff; }
        .btn-brochure { background-color: #1a3c34; color: white; border: 1px solid #fff; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Right Side Form */
        .right-form {
            background: rgba(18, 28, 26, 0.9); /* Dark greenish-black semi-transparent */
            padding: 35px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 1s ease-out;
        }

        .right-form h3 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.4rem;
            color: #fff;
        }

        .form-group { margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #f0f0f0;
            font-size: 1rem;
        }

        .captcha-box {
            display: flex;
            align-items: center;
            background: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .captcha-label {
            padding: 12px;
            color: #333;
            font-weight: bold;
            border-right: 1px solid #ccc;
        }

        .captcha-box input { background: transparent; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #d1e8e2;
            color: #1a3c34;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #fff; }

        .phone-footer {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .phone-footer a {
            color: #4db6ac;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* WhatsApp Floating Icon */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        /* Animations */
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .content-wrapper {
                grid-template-columns: 1fr;
                text-align: center;
                padding-top: 80px;
            }
            .btn-container { justify-content: center; }
            .hero-section { height: auto; min-height: 100vh; }
        }

        /* Swiper Arrows Style */
        .swiper-button-next, .swiper-button-prev {
            color: white !important;
            transform: scale(0.6);
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1545324418-f1d3ac1ef730?auto=format&fit=crop&w=1600&q=80" alt="Building 1"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1600&q=80" alt="Building 2"></div>
                <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1600&q=80" alt="Building 3"></div>
            </div>
            <div class="swiper-button-next desktop-only"></div>
            <div class="swiper-button-prev desktop-only"></div>
        </div>

        <div class="content-wrapper">
            <div class="left-content">
                <h1>EXPRESS ZENITH - TOWER A</h1>
                <h2>3 & 4 BHK Super Luxury Apartments</h2>
                <div class="price-tag">Price Starts @ 2.80 Cr* Onwards</div>
                <div class="new-launch">New Launch Project in Center Noida</div>
                <span class="rera-no">UPRERAPRJ980703/04/2024 <br> www.Up-Rera.In</span>
                
                <div class="btn-container">
                    <a href="tel:9800330039" class="btn btn-call">Call Now</a>
                    <a href="#" class="btn btn-brochure">Download Brochure</a>
                </div>
            </div>

            <div class="right-form">
                <h3>Get Quote For 3 & 4 BHK</h3>
                <form id="leadForm">
                    <div class="form-group">
                        <input type="text" placeholder="Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Email ID" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" placeholder="Mobile No" required>
                    </div>
                    <div class="captcha-box">
                        <div class="captcha-label">4 + 6 =</div>
                        <input type="number" placeholder="Please enter Total" required>
                    </div>
                    <button type="submit" class="submit-btn">Submit</button>
                </form>

                <div class="phone-footer">
                    <p style="margin-bottom: 10px; font-size: 0.8rem; color: #ccc;">OR</p>
                    <a href="tel:9800330039">📞 9800330039</a>
                </div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/919800330039" class="whatsapp-float" target="_blank">

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // Initialize Swiper Background Slider
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            effect: "fade", /* Premium fade transition */
            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
        });

        // Form Submission Logic
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you! Our team will contact you soon.');
        });
    </script>
</body>
</html>
