<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Real Estate Banner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
       

        /* Swiper Container Height */
       .banner-section .swiper {
            width: 100%;
            height: 100vh; /* Full screen height */
        }

       .banner-section .swiper-slide {
            position: relative;
            overflow: hidden;
        }

        /* Background Image Styling */
      .banner-section  .slide-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transform: scale(1.1); /* Initial scale for zoom-out effect */
            transition: transform 4s ease;
        }

        /* Active Slide Zoom Animation */
       .banner-section .swiper-slide-active .slide-bg {
            transform: scale(1);
        }

        /* Dark Overlay */
       .banner-section .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* Content Positioning */
      .banner-section  .slide-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffffff;
            padding: 0 15px;
        }

        /* Text Animations */
       .banner-section .animate-text {
            opacity: 0;
            transform: translateY(30px);
            transition: all var(--transition-speedd) ease-out;
        }

       .banner-section .swiper-slide-active .animate-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Staggered Delay for Subtext */
       .banner-section .swiper-slide-active .delay-1 { transition-delay: 0.3s; }
       .banner-section .swiper-slide-active .delay-2 { transition-delay: 0.6s; }

       .banner-section .banner-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

       .banner-section .banner-subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            max-width: 600px;
        }

        /* Custom Swiper Pagination */
       .banner-section .swiper-pagination-bullet {
            background: #fff;
            opacity: 0.5;
        }
      .banner-section  .swiper-pagination-bullet-active {
            background: #fff;
            opacity: 1;
            width: 30px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<section class="banner-section">
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('https://cdn.maxestates.in/wp-content/themes/max-estate/html/img/project-residential-spotlight-1.jpg');"></div>
                <div class="overlay"></div>
                <div class="slide-content">
                    <h1 class="banner-title animate-text">Modern Luxury</h1>
                    <p class="banner-subtitle animate-text delay-1">Experience the pinnacle of sophisticated living in our premier residential estates.</p>
                    <div class="animate-text delay-2 mt-4">
                        <a href="#" class="btn btn-outline-light btn-lg px-5 rounded-0">Explore More</a>
                    </div>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('https://cdn.maxestates.in/wp-content/themes/max-estate/html/img/project-residential-spotlight-3.jpg');"></div>
                <div class="overlay"></div>
                <div class="slide-content">
                    <h1 class="banner-title animate-text">Elegant Spaces</h1>
                    <p class="banner-subtitle animate-text delay-1">Architectural masterpieces designed for the modern lifestyle.</p>
                    <div class="animate-text delay-2 mt-4">
                        <a href="#" class="btn btn-outline-light btn-lg px-5 rounded-0">View Gallery</a>
                    </div>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="slide-bg" style="background-image: url('https://cdn.maxestates.in/wp-content/uploads/2024/11/me-128-spotlight-new-1.jpg');"></div>
                <div class="overlay"></div>
                <div class="slide-content">
                    <h1 class="banner-title animate-text">Urban Serenity</h1>
                    <p class="banner-subtitle animate-text delay-1">Where nature meets comfort in the heart of the city.</p>
                    <div class="animate-text delay-2 mt-4">
                        <a href="#" class="btn btn-outline-light btn-lg px-5 rounded-0">Contact Us</a>
                    </div>
                </div>
            </div>

        </div>
        <div class="swiper-pagination"></div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    var swiper = new Swiper(".mySwiperban", {
        loop: true,
        speed: 1000,
        autoplay: {
            delay: 5000,
            disableOnInteraction: false,
        },
        effect: 'fade', 
        fadeEffect: {
            crossFade: true
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
        },
    });
</script>

</body>
</html>
