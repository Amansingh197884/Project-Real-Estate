<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Style Animated Gallery</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfc;
        }

        .gallery-container {
            padding: 80px 0;
        }

        /* --- Grid Item Styling --- */
        .img-wrapper {
            position: relative;
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .img-wrapper img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Hover: Only Zoom slightly, no overlay */
        .img-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .img-wrapper:hover img {
            transform: scale(1.08);
        }

        /* --- Custom AOS-Style Popup Animations --- */

        /* Overlay Background */
        .mfp-bg {
            background: rgba(15, 17, 20, 0.95);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .mfp-ready.mfp-bg { opacity: 1; }
        .mfp-removing.mfp-bg { opacity: 0; }

        /* The Animation Logic: Fade-Right + Zoom-In */
        .mfp-wrap .mfp-content {
            opacity: 0;
            /* Start state: Shifted left (so it fades right) and scaled down */
            transform: translateX(-100px) scale(0.7);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Final state when open */
        .mfp-ready .mfp-content {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        /* Exit state */
        .mfp-removing .mfp-content {
            opacity: 0;
            transform: scale(0.8);
        }

        /* --- Custom UI Elements (Buttons) --- */
        .mfp-arrow {
            background: rgba(255, 255, 255, 0.1) !important;
            border-radius: 50% !important;
            width: 60px !important;
            height: 60px !important;
            margin-top: -30px !important;
            opacity: 0.6 !important;
        }
        .mfp-arrow:hover { opacity: 1 !important; background: rgba(255,255,255,0.2) !important; }

        .mfp-close {
            width: 44px !important;
            height: 44px !important;
            background: #fff !important;
            color: #000 !important;
            border-radius: 50%;
            top: 30px !important;
            right: 30px !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px !important;
            transition: 0.3s ease;
        }
        .mfp-close:hover { transform: scale(1.1) rotate(90deg); }

        .mfp-counter {
            top: 40px;
            font-weight: 700;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

<div class="container gallery-container">
    <div class="row mb-5 text-center">
        <div class="col-12">
            <h2 class="fw-bold">Cinematic Gallery</h2>
            <p class="text-muted">Fade-Right & Zoom entrance effect</p>
        </div>
    </div>

    <div class="row" id="aos-gallery">
        <div class="col-lg-4 col-md-6">
            <a href="https://picsum.photos/id/101/1200/800" class="img-wrapper">
                <img src="https://picsum.photos/id/101/600/450" alt="Image 1">
            </a>
        </div>
        <div class="col-lg-4 col-md-6">
            <a href="https://picsum.photos/id/102/1200/800" class="img-wrapper">
                <img src="https://picsum.photos/id/102/600/450" alt="Image 2">
            </a>
        </div>
        <div class="col-lg-4 col-md-6">
            <a href="https://picsum.photos/id/103/1200/800" class="img-wrapper">
                <img src="https://picsum.photos/id/103/600/450" alt="Image 3">
            </a>
        </div>
        <div class="col-lg-4 col-md-6">
            <a href="https://picsum.photos/id/104/1200/800" class="img-wrapper">
                <img src="https://picsum.photos/id/104/600/450" alt="Image 4">
            </a>
        </div>
        <div class="col-lg-4 col-md-6">
            <a href="https://picsum.photos/id/106/1200/800" class="img-wrapper">
                <img src="https://picsum.photos/id/106/600/450" alt="Image 5">
            </a>
        </div>
        <div class="col-lg-4 col-md-6">
            <a href="https://picsum.photos/id/107/1200/800" class="img-wrapper">
                <img src="https://picsum.photos/id/107/600/450" alt="Image 6">
            </a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>

<script>
    $(document).ready(function() {
        $('#aos-gallery').magnificPopup({
            delegate: 'a',
            type: 'image',
            gallery: {
                enabled: true,
                navigateByImgClick: true,
                preload: [0,1]
            },
            mainClass: 'mfp-fade', // Required to trigger the transitions
            removalDelay: 600,     // Time for the closing animation
            callbacks: {
                beforeOpen: function() {
                    // This is where you can add logic before open
                }
            }
        });
    });
</script>

</body>
</html>
